<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flipbook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  body { background:#2E5077; margin:0; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; font-family:sans-serif; }
  #flipbook { box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .controls { margin-top:20px; display:flex; gap:10px; align-items:center; }
  .controls button { background:#4DA1A9; color:#fff; border:0; padding:10px 24px; border-radius:6px; cursor:pointer; font-size:15px; }
  .controls button:hover { background:#99C5CB; }
  #counter { color:#fff; }
  #loading { color:#fff; font-size:18px; }
</style>
</head>
<body>

<div id="loading">جاري التحميل...</div>
<div id="flipbook"></div>

<div class="controls" style="display:none" id="ctrls">
  <button onclick="pageFlip.flipPrev()">السابق</button>
  <span id="counter"></span>
  <button onclick="pageFlip.flipNext()">التالي</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const params = new URLSearchParams(window.location.search);
const PDF_URL = params.get("pdf") || "report.pdf";

let pageFlip;

(async () => {
  const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
  const pages = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
    pages.push(canvas.toDataURL("image/jpeg", 0.85));
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("ctrls").style.display = "flex";

  pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
    width: 500, height: 700,
    size: "stretch",
    minWidth: 300, maxWidth: 800,
    minHeight: 400, maxHeight: 1100,
    showCover: true,
    mobileScrollSupport: true,
  });

  pageFlip.loadFromImages(pages.reverse());

  const updateCounter = () => {
    const total = pdf.numPages;
    const current = total - pageFlip.getCurrentPageIndex();
    document.getElementById("counter").textContent = current + " / " + total;
  };
  pageFlip.on("flip", updateCounter);
  updateCounter();
})();
</script>
</body>
</html>

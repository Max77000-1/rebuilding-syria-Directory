<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flipbook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  html, body { margin:0; padding:0; }
  body { background:#2E5077; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100vw; height:88vh; font-family:sans-serif; padding:5vh 8vw; box-sizing:border-box; overflow:hidden; }
  #flipbook { box-shadow: 0 10px 40px rgba(0,0,0,0.4); flex:1; width:100%; max-height: calc(100% - 60px); }
  .controls { margin-top:15px; display:flex; gap:14px; align-items:center; flex-shrink:0; }
  .controls button { background:#4DA1A9; color:#fff; border:0; width:42px; height:42px; border-radius:50%; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition: background 0.2s; }
  .controls button:hover { background:#99C5CB; }
  .controls button svg { width:18px; height:18px; fill:#fff; }
  #counter { color:#fff; font-size:14px; min-width:60px; text-align:center; }
  #loading { color:#fff; font-size:18px; }
</style>
</head>
<body>

<div id="loading">جاري التحميل...</div>
<div id="flipbook"></div>

<div class="controls" style="display:none" id="ctrls">
  <button onclick="pageFlip.flipPrev()" aria-label="السابق">
    <svg viewBox="0 0 24 24"><path d="M15.5 19l-7-7 7-7v14z"/></svg>
  </button>
  <span id="counter"></span>
  <button onclick="pageFlip.flipNext()" aria-label="التالي">
    <svg viewBox="0 0 24 24"><path d="M8.5 5l7 7-7 7V5z"/></svg>
  </button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const params = new URLSearchParams(window.location.search);
const PDF_URL = params.get("pdf") || "report.pdf";

let pageFlip;

(async () => {
  const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
  const pages = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
    pages.push(canvas.toDataURL("image/jpeg", 0.85));
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("ctrls").style.display = "flex";

  const firstPage = await pdf.getPage(1);
  const vp = firstPage.getViewport({ scale: 1 });
  const ratio = vp.width / vp.height;

  pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
    width: Math.round(600 * ratio),
    height: 600,
    size: "stretch",
    minWidth: 300, maxWidth: 2000,
    minHeight: 300, maxHeight: 1500,
    showCover: true,
    mobileScrollSupport: true,
  });

  pageFlip.loadFromImages(pages.reverse());

  const updateCounter = () => {
    const total = pdf.numPages;
    const current = total - pageFlip.getCurrentPageIndex();
    document.getElementById("counter").textContent = current + " / " + total;
  };
  pageFlip.on("flip", updateCounter);
  updateCounter();
})();
</script>
</body>
</html>
